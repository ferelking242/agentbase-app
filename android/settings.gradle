pluginManagement {
    def flutterSdkPath = {
        def envPath = System.getenv("FLUTTER_ROOT")
        if (envPath) return envPath
        def props = new Properties()
        def propsFile = file("local.properties")
        if (propsFile.exists()) propsFile.withInputStream { props.load(it) }
        def sdk = props.getProperty("flutter.sdk")
        assert sdk, "Flutter SDK not found. Set FLUTTER_ROOT env var or flutter.sdk in local.properties"
        return sdk
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    plugins {
        id 'com.android.application' version '8.2.2' apply false
        id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ":app"
