name: 🚀 Build iOS & Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  #  ANDROID BUILD
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Precache Android artifacts
        run: flutter precache --android

      - name: Generate correct Gradle files from Flutter template
        run: |
          # Create a temp Flutter project to get correct 3.22.0 Gradle files
          flutter create --org com.ferelking242 --project-name agentbase_temp /tmp/flutter_template
          # Copy template Gradle files (guaranteed compatible with this Flutter version)
          cp /tmp/flutter_template/android/settings.gradle android/
          cp /tmp/flutter_template/android/build.gradle android/
          cp /tmp/flutter_template/android/app/build.gradle android/app/
          cp /tmp/flutter_template/android/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/
          # Patch app/build.gradle namespace to our package
          sed -i 's/com\.ferelking242\.agentbase_temp/com.ferelking242.agentbase/g' android/app/build.gradle
          sed -i 's/applicationId "com\.ferelking242\.agentbase_temp"/applicationId "com.ferelking242.agentbase"/g' android/app/build.gradle
          # Create local.properties for CI (needed by settings.gradle)
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "✅ Generated Gradle files:"
          cat android/settings.gradle
          echo "---"
          head -20 android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release, no sign)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agentbase-android-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build APK arm64 split
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi
        continue-on-error: true

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: agentbase-android-arm64-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
        continue-on-error: true

  # ─────────────────────────────────────────────
  #  IOS BUILD (no codesign — TrollStore ready)
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS IPA (no sign)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        env:
          LANG: en_US.UTF-8

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA (TrollStore compatible)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AgentBase.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: agentbase-ios-${{ github.sha }}
          path: AgentBase.ipa
          retention-days: 30

  # ─────────────────────────────────────────────
  #  SUMMARY
  # ─────────────────────────────────────────────
  summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## 🚀 AgentBase Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 Android APK | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 iOS IPA (TrollStore) | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
