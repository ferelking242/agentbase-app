name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  #  WEB BUILD + GITHUB PAGES
  # ─────────────────────────────────────────────
  build-web:
    name: 🌐 Flutter Web → GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href /agentbase/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    name: 🚀 Deploy to ferelking242.github.io/agentbase
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────
  #  ANDROID BUILD
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Precache Android artifacts
        run: flutter precache --android

      - name: Generate Gradle files from Flutter template
        run: |
          flutter create --org com.aivos --project-name agentbase_temp /tmp/flutter_template
          cp /tmp/flutter_template/android/settings.gradle android/
          cp /tmp/flutter_template/android/build.gradle android/
          cp /tmp/flutter_template/android/app/build.gradle android/app/
          cp /tmp/flutter_template/android/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/
          sed -i 's/com\.aivos\.agentbase_temp/com.aivos.agentbase/g' android/app/build.gradle
          sed -i 's/applicationId "com\.aivos\.agentbase_temp"/applicationId "com.aivos.agentbase"/g' android/app/build.gradle
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agentbase-android-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build APK arm64
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi
        continue-on-error: true

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: agentbase-android-arm64-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
        continue-on-error: true

  # ─────────────────────────────────────────────
  #  IOS BUILD
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS IPA (no sign)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        env:
          LANG: en_US.UTF-8

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AgentBase.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: agentbase-ios-${{ github.sha }}
          path: AgentBase.ipa
          retention-days: 30

  # ─────────────────────────────────────────────
  #  SUMMARY
  # ─────────────────────────────────────────────
  summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-ios]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## 🚀 AgentBase Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web (GitHub Pages) | ${{ needs.build-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 Android APK | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 iOS IPA | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Live:** https://ferelking242.github.io/agentbase" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
